<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Wizard - Stage 0</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background-color: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px; font-family: sans-serif;">

    <article data-testid="test-todo-card" style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); width: 100%; max-width: 450px; border: 1px solid #e5e7eb;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
            <span data-testid="test-todo-priority" style="background: #fee2e2; color: #991b1b; padding: 4px 12px; border-radius: 9999px; font-size: 0.75rem; font-weight: bold;" aria-label="Priority High">High</span>
            <strong data-testid="test-todo-status" id="status-text" style="color: #d97706; font-size: 0.875rem;">Pending</strong>
        </div>

        <h2 data-testid="test-todo-title" id="todo-title" style="margin: 0 0 10px 0; font-size: 1.5rem; transition: all 0.3s;">Stage 0 Task</h2>
        <p data-testid="test-todo-description" style="color: #4b5563; margin-bottom: 20px; font-size: 0.95rem;">
            Build a clean Todo Card with specific test attributes and responsive design.
        </p>

        <div style="margin-bottom: 20px; font-size: 0.9rem; color: #6b7280; display: flex; flex-direction: column; gap: 4px;">
            <time data-testid="test-todo-due-date" datetime="2026-03-01">Due Mar 01, 2026</time>
            <div data-testid="test-todo-time-remaining" id="time-remaining" style="color: #2563eb; font-weight: bold;" aria-live="polite">
                Calculating...
            </div>
        </div>

        <ul data-testid="test-todo-tags" role="list" style="display: flex; gap: 8px; list-style: none; padding: 0; margin-bottom: 20px; flex-wrap: wrap;">
            <li data-testid="test-todo-tag-work" style="background: #f3f4f6; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; color: #374151;">work</li>
            <li data-testid="test-todo-tag-urgent" style="background: #f3f4f6; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; color: #374151;">urgent</li>
        </ul>

        <footer style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #e5e7eb; padding-top: 20px;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="complete-toggle" data-testid="test-todo-complete-toggle" style="width: 18px; height: 18px; cursor: pointer;">
                <label for="complete-toggle" style="cursor: pointer; font-weight: 500; font-size: 0.9rem;">Complete</label>
            </div>
            <div style="display: flex; gap: 10px;">
                <button data-testid="test-todo-edit-button" aria-label="Edit Task" style="background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 4px;">✏️</button>
                <button data-testid="test-todo-delete-button" aria-label="Delete Task" onclick="alert('Delete clicked')" style="background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 4px;">🗑️</button>
            </div>
        </footer>
    </article>

    <script src="script.js"></script>
</body>
</html>
