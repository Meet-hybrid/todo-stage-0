<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Wizard - Stage 1</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <article data-testid="test-todo-card" class="todo-card" id="todo-card">
        <div data-testid="test-todo-priority-indicator" id="priority-indicator" class="priority-accent high"></div>

        <div id="view-mode">
            <header class="card-header">
                <span data-testid="test-todo-priority" class="badge" id="display-priority">High</span>
                
                <select data-testid="test-todo-status-control" id="status-control" aria-label="Change Task Status">
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Done">Done</option>
                </select>
                <strong data-testid="test-todo-status" id="status-display">Pending</strong>
            </header>

            <h2 data-testid="test-todo-title" id="todo-title">Stage 1: Interactive Card</h2>
            
            <button data-testid="test-todo-expand-toggle" id="expand-toggle" aria-expanded="false" aria-controls="todo-description-section">
                Show Description
            </button>
            <div data-testid="test-todo-collapsible-section" id="todo-description-section" class="collapsed">
                <p data-testid="test-todo-description" id="todo-description">
                    This is a long description designed to test the expand and collapse behavior of the Stage 1 Todo Card component. It should be hidden by default.
                </p>
            </div>

            <div class="date-info">
                <time data-testid="test-todo-due-date" id="display-due-date" datetime="2026-03-01T18:00:00Z">Due Mar 1, 2026</time>
                <div class="time-wrapper">
                    <time data-testid="test-todo-time-remaining" id="time-remaining" aria-live="polite">Calculating...</time>
                    <span data-testid="test-todo-overdue-indicator" id="overdue-badge" class="hidden">OVERDUE</span>
                </div>
            </div>

            <ul data-testid="test-todo-tags" role="list" class="tags">
                <li data-testid="test-todo-tag-work">work</li>
                <li data-testid="test-todo-tag-urgent">urgent</li>
            </ul>

            <footer class="actions">
                <div class="toggle-container">
                    <input type="checkbox" id="complete-toggle" data-testid="test-todo-complete-toggle">
                    <label for="complete-toggle">Done</label>
                </div>
                <div class="buttons">
                    <button data-testid="test-todo-edit-button" id="edit-btn" aria-label="Edit Task">✏️ Edit</button>
                    <button data-testid="test-todo-delete-button" aria-label="Delete Task">🗑️</button>
                </div>
            </footer>
        </div>

        <form data-testid="test-todo-edit-form" id="edit-mode" class="hidden">
            <label for="edit-title">Title</label>
            <input type="text" data-testid="test-todo-edit-title-input" id="edit-title" required>

            <label for="edit-description">Description</label>
            <textarea data-testid="test-todo-edit-description-input" id="edit-description"></textarea>

            <label for="edit-priority">Priority</label>
            <select data-testid="test-todo-edit-priority-select" id="edit-priority">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>

            <label for="edit-due-date">Due Date</label>
            <input type="datetime-local" data-testid="test-todo-edit-due-date-input" id="edit-due-date">

            <div class="form-buttons">
                <button type="button" data-testid="test-todo-save-button" id="save-btn" class="btn-save">Save</button>
                <button type="button" data-testid="test-todo-cancel-button" id="cancel-btn" class="btn-cancel">Cancel</button>
            </div>
        </form>
    </article>

    <script src="script.js"></script>
</body>
</html>
